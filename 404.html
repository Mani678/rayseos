<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{-webkit-text-size-adjust:100%}

nav,main,footer{position:relative;z-index:2}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bladeIn{from{width:0}to{width:56px}}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 56px;border-bottom:1px solid var(--border);flex-shrink:0}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 40px;position:relative;overflow:hidden}

.content{position:relative;z-index:1;max-width:520px;animation:fadeUp 0.7s ease both}
.content-kicker{font-family:var(--mono);font-size:10px;font-weight:300;color:var(--blade);text-transform:uppercase;letter-spacing:0.18em;margin-bottom:20px;display:flex;align-items:center;gap:10px}

.content-title strong{font-weight:600;display:block}
.content-title em{font-style:italic;color:var(--blade);display:block}
.content-blade{display:block;width:0;height:2px;background:var(--blade);margin:24px 0;animation:bladeIn 0.8s ease 0.5s forwards;opacity:0.6}
.content-desc{font-size:15px;color:var(--off);line-height:1.75;font-weight:300;margin-bottom:36px;max-width:400px}
.btn-group{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{padding:12px 28px;border:1px solid var(--blade);font-family:var(--mono);font-size:11px;font-weight:400;color:var(--blade);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.btn-primary:hover{background:var(--blade);color:#000}
.btn-secondary{padding:12px 28px;border:1px solid rgba(242,241,238,0.1);font-family:var(--mono);font-size:11px;font-weight:300;color:var(--faint);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.btn-secondary:hover{border-color:rgba(242,241,238,0.2);color:var(--white)}
.quick-links{display:flex;gap:20px;margin-top:32px;flex-wrap:wrap}
.quick-link{font-family:var(--mono);font-size:10px;color:var(--faint);text-decoration:none;text-transform:uppercase;letter-spacing:0.1em;transition:color 0.2s;display:flex;align-items:center;gap:6px}
.quick-link::before{content:'→';color:rgba(232,201,125,0.3);font-size:11px}
.quick-link:hover{color:var(--blade)}
footer{border-top:1px solid var(--border);padding:20px 56px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--bg2);flex-shrink:0}
.footer-word{font-family:var(--serif);font-size:14px;font-weight:400;color:rgba(242,241,238,0.2)}
.footer-word em{font-style:normal;color:rgba(232,201,125,0.35)}
.footer-copy{font-family:var(--mono);font-size:9px;color:rgba(242,241,238,0.12);text-transform:uppercase;letter-spacing:0.08em}
.footer-links{display:flex;gap:20px}
.footer-link{font-family:var(--mono);font-size:10px;color:rgba(242,241,238,0.18);text-decoration:none;text-transform:uppercase;letter-spacing:0.08em;transition:color 0.2s}
.footer-link:hover{color:var(--blade)}
@media(max-width:600px){nav{padding:14px 20px}.btn-group{flex-direction:column}.btn-primary,.btn-secondary{text-align:center;justify-content:center}footer{padding:16px 20px;justify-content:center;text-align:center}.footer-links{justify-content:center}}
</style>
</head>
